spring:
  jpa:
    open-in-view: false

eureka:
  instance:
    instance-id: ${spring.cloud.client.hostname}:${spring.application.name}:${random.value}
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://sgivu-discovery:8761/eureka}

config:
  base-url:
    endpoint:
      sgivu-auth: ${SGIVU_AUTH_URL:http://sgivu-auth}

server:
  port: ${PORT:0}

# Clave secreta para la comunicación segura entre servicios
service:
  internal:
    secret-key: "${SERVICE_INTERNAL_SECRET_KEY}"

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: 0.1
  zipkin:
    tracing:
      endpoint: http://sgivu-zipkin:9411/api/v2/spans

logging:
  level:
    root: INFO
