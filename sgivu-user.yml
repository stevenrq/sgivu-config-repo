# sgivu-user (default)
#
# Variables de entorno clave:
# - EUREKA_URL: URL del Eureka Server para discovery.
# - SGIVU_AUTH_URL: issuer para validar tokens JWT.
# - SERVICE_INTERNAL_SECRET_KEY: clave usada por `X-Internal-Service-Key` en endpoints internos.

spring:
  jpa:
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline-on-migrate: true para DBs existentes con schema ya creado
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}
    baseline-version: 0
    validate-on-migrate: true

eureka:
  instance:
    instance-id: ${spring.cloud.client.hostname}:${spring.application.name}:${random.value}
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://sgivu-discovery:8761/eureka}

services:
  map:
    sgivu-auth:
      name: sgivu-auth
      url: ${SGIVU_AUTH_URL:http://sgivu-auth:9000}

server:
  port: ${PORT:8081}

# Clave secreta para la comunicación segura entre servicios
service:
  internal:
    secret-key: "${SERVICE_INTERNAL_SECRET_KEY}"

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: 0.1
  zipkin:
    tracing:
      endpoint: http://sgivu-zipkin:9411/api/v2/spans

logging:
  level:
    root: INFO
